<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phil's Sites</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/shared.css">
  <style>
    body {
      background: #0e0e0e;
      color: #f0ede6;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 600px;
      width: 100%;
      padding: 4rem 2rem;
    }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 2rem;
      font-weight: 400;
      margin-bottom: 2.5rem;
      color: #f0ede6;
    }

    .page-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .page-list a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.5rem;
      background: #161616;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      text-decoration: none;
      color: #f0ede6;
      transition: border-color 0.2s, background 0.2s;
    }

    .page-list a:hover {
      border-color: rgba(255,255,255,0.2);
      background: #1e1e1e;
    }

    .page-name {
      font-size: 0.95rem;
      font-weight: 500;
    }

    .page-meta {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: #888;
      letter-spacing: 0.05em;
    }

    .arrow {
      font-size: 0.8rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="eyebrow">Phil Tan · my-websites</p>
    <h1>Pages</h1>
    <ul class="page-list">
      <li>
        <a href="asia-trip-2026.html">
          <span>
            <div class="page-name">Asia Trip 2026</div>
            <div class="page-meta">Sep 26, 2026 — Jan 8, 2027 · Phil &amp; Nelie</div>
          </span>
          <span class="arrow">→</span>
        </a>
      </li>
      <li>
        <a href="miami-trip.html">
          <span>
            <div class="page-name">Miami Trip</div>
            <div class="page-meta">Jul 2–5, 2026 · Jon's 32nd Birthday</div>
          </span>
          <span class="arrow">→</span>
        </a>
      </li>
    </ul>
  </div>
</body>
</html>
